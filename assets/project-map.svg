<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1080" viewBox="0 0 1200 1080" role="img" aria-labelledby="title desc">
  <title id="title">Caleb Hattingh public project map</title>
  <desc id="desc">A curated map of important public, non-fork projects by Caleb Hattingh, with headline projects, a maintainer note for tantivy-py, and thematic project groupings.</desc>
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --panel-2: #eef6ff;
      --ink: #172033;
      --muted: #5c677d;
      --hairline: #d8dee9;
      --blue: #2f81f7;
      --purple: #8250df;
      --orange: #bc6b00;
      --shadow: rgba(27, 31, 36, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #111d2f;
        --ink: #e6edf3;
        --muted: #8b949e;
        --hairline: #30363d;
        --blue: #58a6ff;
        --purple: #bc8cff;
        --orange: #ffa657;
        --shadow: rgba(0, 0, 0, 0.35);
      }
    }
    text { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .bg { fill: var(--bg); }
    .grid { stroke: var(--hairline); stroke-opacity: 0.45; }
    .title { fill: var(--ink); font-size: 50px; font-weight: 820; letter-spacing: -1.5px; }
    .subtitle { fill: var(--muted); font-size: 19px; }
    .section { fill: var(--ink); font-size: 20px; font-weight: 780; letter-spacing: -0.2px; }
    .section-note { fill: var(--muted); font-size: 13.5px; }
    .card rect, .group rect, .callout rect { fill: var(--panel); stroke: var(--hairline); stroke-width: 1.2; filter: drop-shadow(0 6px 13px var(--shadow)); }
    .card.feature rect { fill: var(--panel-2); }
    .repo { fill: var(--ink); font-size: 20px; font-weight: 760; letter-spacing: -0.2px; }
    .bullet { fill: var(--muted); font-size: 13.2px; }
    .copy { fill: var(--muted); font-size: 13.5px; }
    .metric { fill: var(--muted); font-size: 13px; font-weight: 700; }
    .pill text { fill: #ffffff; font-size: 10.5px; font-weight: 830; letter-spacing: 0.5px; }
    .python { fill: var(--blue); }
    .rust { fill: var(--orange); }
    .maint { fill: var(--purple); }
    .edge { stroke: var(--hairline); stroke-width: 1.25; stroke-dasharray: 4 8; stroke-linecap: round; opacity: 0.75; }
    .node { fill: var(--bg); stroke-width: 3; }
    .node.python { stroke: var(--blue); }
    .node.rust { stroke: var(--orange); }
    .legend { fill: var(--muted); font-size: 12.5px; }
  </style>

  <defs>
    <pattern id="dot-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path class="grid" d="M 32 0 L 0 0 0 32" fill="none" />
      <circle cx="0" cy="0" r="1.2" fill="var(--hairline)" opacity="0.55" />
    </pattern>
  </defs>

  <rect class="bg" width="1200" height="1080" rx="28" />
  <rect width="1200" height="1080" fill="url(#dot-grid)" opacity="0.42" rx="28" />

  <text class="title" x="60" y="76">Small, orthogonal tools</text>
  <text class="subtitle" x="62" y="111">Curated public work: useful pieces with narrow interfaces, sharp edges, and room to compose.</text>

  <g class="pill" transform="translate(942 54)">
    <rect width="86" height="28" rx="14" class="python" />
    <text x="43" y="19" text-anchor="middle">PYTHON</text>
  </g>
  <g class="pill" transform="translate(1040 54)">
    <rect width="68" height="28" rx="14" class="rust" />
    <text x="34" y="19" text-anchor="middle">RUST</text>
  </g>
  <g class="pill" transform="translate(942 90)">
    <rect width="166" height="28" rx="14" class="maint" />
    <text x="83" y="19" text-anchor="middle">MAINTAINED UPSTREAM</text>
  </g>


  <!-- Headline projects -->
  <a href="https://github.com/cjrh/aiorun"><g class="card feature" transform="translate(60 148)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">aiorun</text><text class="metric" x="194" y="34">★ 468</text><text class="copy" x="20" y="62">Async app startup, shutdown,</text><text class="copy" x="20" y="82">signals, and cancellation.</text><g class="pill" transform="translate(20 91)"><rect width="74" height="18" rx="9" class="python"/><text x="37" y="13" text-anchor="middle">PYTHON</text></g></g></a>
  <a href="https://github.com/cjrh/easycython"><g class="card feature" transform="translate(335 148)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">easycython</text><text class="metric" x="200" y="34">★ 96</text><text class="copy" x="20" y="62">Build Cython modules without</text><text class="copy" x="20" y="82">setup.py boilerplate.</text><g class="pill" transform="translate(20 91)"><rect width="74" height="18" rx="9" class="python"/><text x="37" y="13" text-anchor="middle">PYTHON</text></g></g></a>
  <a href="https://github.com/cjrh/autoslot"><g class="card feature" transform="translate(610 148)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">autoslot</text><text class="metric" x="200" y="34">★ 70</text><text class="copy" x="20" y="62">Automatic __slots__ for</text><text class="copy" x="20" y="82">leaner Python classes.</text><g class="pill" transform="translate(20 91)"><rect width="74" height="18" rx="9" class="python"/><text x="37" y="13" text-anchor="middle">PYTHON</text></g></g></a>
  <a href="https://github.com/cjrh/aiomsg"><g class="card feature" transform="translate(885 148)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">aiomsg</text><text class="metric" x="202" y="34">★ 17</text><text class="copy" x="20" y="62">Messaging protocols and smart</text><text class="copy" x="20" y="82">sockets for network apps.</text><g class="pill" transform="translate(20 91)"><rect width="58" height="18" rx="9" class="rust"/><text x="29" y="13" text-anchor="middle">RUST</text></g></g></a>

  <a href="https://github.com/cjrh/excitertools"><g class="card feature" transform="translate(60 286)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">excitertools</text><text class="metric" x="202" y="34">★ 15</text><text class="copy" x="20" y="62">Fluent, composable iteration</text><text class="copy" x="20" y="82">without losing Python shape.</text><g class="pill" transform="translate(20 91)"><rect width="74" height="18" rx="9" class="python"/><text x="37" y="13" text-anchor="middle">PYTHON</text></g></g></a>
  <a href="https://github.com/cjrh/misu"><g class="card feature" transform="translate(335 286)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">misu</text><text class="metric" x="202" y="34">★ 15</text><text class="copy" x="20" y="62">Fast physical quantities and</text><text class="copy" x="20" y="82">dimensions in Python.</text><g class="pill" transform="translate(20 91)"><rect width="74" height="18" rx="9" class="python"/><text x="37" y="13" text-anchor="middle">PYTHON</text></g></g></a>
  <a href="https://github.com/cjrh/deadpool"><g class="card feature" transform="translate(610 286)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">deadpool</text><text class="metric" x="202" y="34">★ 18</text><text class="copy" x="20" y="62">A ProcessPoolExecutor that</text><text class="copy" x="20" y="82">is harder to break.</text><g class="pill" transform="translate(20 91)"><rect width="74" height="18" rx="9" class="python"/><text x="37" y="13" text-anchor="middle">PYTHON</text></g></g></a>
  <a href="https://github.com/cjrh/lifter"><g class="card feature" transform="translate(885 286)"><rect width="255" height="112" rx="18"/><text class="repo" x="20" y="34">lifter</text><text class="metric" x="202" y="34">★ 17</text><text class="copy" x="20" y="62">Sync single-file binaries</text><text class="copy" x="20" y="82">from GitHub Releases.</text><g class="pill" transform="translate(20 91)"><rect width="58" height="18" rx="9" class="rust"/><text x="29" y="13" text-anchor="middle">RUST</text></g></g></a>

  <!-- Maintainer callout -->
  <a href="https://github.com/quickwit-oss/tantivy-py">
    <g class="callout" transform="translate(60 450)">
      <rect width="1080" height="126" rx="24" />
      <g class="pill" transform="translate(28 28)"><rect width="156" height="24" rx="12" class="maint"/><text x="78" y="16" text-anchor="middle">CORE MAINTAINER</text></g>
      <text class="repo" x="28" y="80">quickwit-oss/tantivy-py</text>
      <text class="metric" x="276" y="80">★ 419</text>
      <text class="copy" x="28" y="105">Python bindings for Tantivy — search infrastructure work maintained upstream rather than under the cjrh namespace.</text>
      <g class="pill" transform="translate(970 53)"><rect width="58" height="20" rx="10" class="rust"/><text x="29" y="14" text-anchor="middle">RUST</text></g>
    </g>
  </a>

  <!-- Thematic groupings -->
  <g class="group" transform="translate(60 632)">
    <rect width="340" height="168" rx="18" />
    <text class="section" x="22" y="34">Async &amp; reliability</text>
    <text class="section-note" x="22" y="58">Making service lifecycles explicit.</text>
    <text class="bullet" x="22" y="88">• aiorun — startup, shutdown, signals</text>
    <text class="bullet" x="22" y="112">• deadpool — resilient process pools</text>
    <text class="bullet" x="22" y="136">• coroexecutor — nursery-like execution</text>
  </g>

  <g class="group" transform="translate(430 632)">
    <rect width="340" height="168" rx="18" />
    <text class="section" x="22" y="34">Developer workflows</text>
    <text class="section-note" x="22" y="58">Tools that remove one annoying step.</text>
    <text class="bullet" x="22" y="88">• lifter — sync release binaries</text>
    <text class="bullet" x="22" y="112">• stackymcstackface — stacked PRs</text>
    <text class="bullet" x="22" y="136">• clonymccloneface — clone with upstreams</text>
  </g>

  <g class="group" transform="translate(800 632)">
    <rect width="340" height="168" rx="18" />
    <text class="section" x="22" y="34">Language, data &amp; search</text>
    <text class="section-note" x="22" y="58">Offline words, indexing, compact ideas.</text>
    <text class="bullet" x="22" y="88">• tantivy-py — Python search bindings</text>
    <text class="bullet" x="22" y="112">• thesauromatic — offline thesaurus</text>
    <text class="bullet" x="22" y="136">• dictomatic / rhymomatic — word tools</text>
  </g>

  <g class="group" transform="translate(60 832)">
    <rect width="340" height="168" rx="18" />
    <text class="section" x="22" y="34">Python ergonomics</text>
    <text class="section-note" x="22" y="58">Small APIs that hide machinery.</text>
    <text class="bullet" x="22" y="88">• autoslot — leaner object models</text>
    <text class="bullet" x="22" y="112">• excitertools — composable iteration</text>
    <text class="bullet" x="22" y="136">• easycython / misu — speed without fuss</text>
  </g>

  <g class="group" transform="translate(430 832)">
    <rect width="340" height="168" rx="18" />
    <text class="section" x="22" y="34">Runtime boundaries</text>
    <text class="section-note" x="22" y="58">Where processes, containers, env meet.</text>
    <text class="bullet" x="22" y="88">• dockerctx — scoped containers</text>
    <text class="bullet" x="22" y="112">• biodome — environment configuration</text>
    <text class="bullet" x="22" y="136">• playpen / chimera — process edges</text>
  </g>

  <g class="group" transform="translate(800 832)">
    <rect width="340" height="168" rx="18" />
    <text class="section" x="22" y="34">Rust experiments</text>
    <text class="section-note" x="22" y="58">Database bindings, UI, systems glue.</text>
    <text class="bullet" x="22" y="88">• diesel-clickhouse / diesel-paradedb</text>
    <text class="bullet" x="22" y="112">• iced-themer — declarative themes</text>
    <text class="bullet" x="22" y="136">• debussy / aiomsg — desktop + network</text>
  </g>

  <text class="legend" x="60" y="1044">Hand-curated SVG: public, non-fork work only. The README repeats links for GitHub accessibility and navigation.</text>
</svg>
